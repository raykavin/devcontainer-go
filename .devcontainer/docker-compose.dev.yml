services:
  golang:
    tty: true
    container_name: development_golang
    restart: on-failure
    working_dir: /workspaces/app
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    networks:
      - devnet
    volumes:
      - ./../:/workspaces/app:rw
      - ../.docker/go/bin:/go/bin:rw
      - ../.docker/go/pkg:/go/pkg:rw

networks:
  devnet:
    name: devnet
    driver: bridge
